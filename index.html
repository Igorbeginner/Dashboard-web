<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="menu">
                <div>
                    <span class="material-icons">house</span>
                </div>
                <div>
                    <span class="material-icons">bar_chart</span>
                </div>
                <div>
                    <span class="material-icons">credit_card</span>
                </div>
                <div>
                    <span class="material-icons">build</span>
                </div>
            </div>
        </div>



        <div class="dash">
            <div class="box1">
                <div class="cards-info">
                    <div class="card1">
                        <div class="piece1">
                            <h6>Total de chamadas</h6>
                            <h2>22.675</h2>
                        </div>
                        <div class="piece2">
                            <div class="icon">
                                <span class="material-icons">more_horiz</span>
                            </div>
                            <!-- Por fins estéticos, pedi para o chat fazer essa parte -->
                            <div class="line-chart">
                                <svg viewBox="0 0 100 40">
                                    <path d="M5 25 C18 8, 28 8, 40 24 S62 40, 75 22 S92 8, 98 18" />
                                </svg>
                            </div>
                            <!--  -->
                        </div>
                    </div>
                    <div class="card1">
                        <div class="piece1">
                            <h6>Concluídos</h6>
                            <h2>20.307</h2>
                        </div>
                        <div class="piece2">
                            <div class="icon">
                                <span class="material-icons">more_horiz</span>
                            </div>
                            <!-- Por fins estéticos, pedi para o chat fazer essa parte -->
                            <div class="line-chart">
                                <svg viewBox="0 0 100 40">
                                    <path d="M5 25 C18 8, 28 8, 40 24 S62 40, 75 22 S92 8, 98 18" />
                                </svg>
                            </div>
                            <!--  -->
                        </div>
                    </div>
                    <div class="card1">
                        <div class="piece1">
                            <h6>Concluídos no prazo</h6>
                            <h2>14.214</h2>
                        </div>
                        <div class="piece2">
                            <div class="icon">
                                <span class="material-icons">more_horiz</span>
                            </div>
                            <!-- Por fins estéticos, pedi para o chat fazer essa parte -->
                            <div class="line-chart">
                                <svg viewBox="0 0 100 40">
                                    <path d="M5 25 C18 8, 28 8, 40 24 S62 40, 75 22 S92 8, 98 18" />
                                </svg>
                            </div>
                            <!--  -->
                        </div>
                    </div>
                    <div class="card1">
                        <div class="piece1">
                            <h6>Concluídos fora do prazo</h6>
                            <h2>6.092</h2>
                        </div>
                        <div class="piece2">
                            <div class="icon">
                                <span class="material-icons">more_horiz</span>
                            </div>
                            <!-- Por fins estéticos, pedi para o chat fazer essa parte -->
                            <div class="line-chart">
                                <svg viewBox="0 0 100 40">
                                    <path d="M5 25 C18 8, 28 8, 40 24 S62 40, 75 22 S92 8, 98 18" />
                                </svg>
                            </div>
                            <!--  -->
                        </div>
                    </div>
                    <div class="card1">
                        <div class="piece1">
                            <h6>Total em aberto</h6>
                            <h2>22.675</h2>
                        </div>
                        <div class="piece2">
                            <div class="icon">
                                <span class="material-icons">more_horiz</span>
                            </div>
                            <!-- Por fins estéticos, pedi para o chat fazer essa parte -->
                            <div class="line-chart">
                                <svg viewBox="0 0 100 40">
                                    <path d="M5 25 C18 8, 28 8, 40 24 S62 40, 75 22 S92 8, 98 18" />
                                </svg>
                            </div>
                            <!--  -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="box2">
                <div class="visao-geral">
                    <div class="tittle">
                        <h3>Visão Geral</h3>
                    </div>
                    <div class="graphics">
                        <div class="concluidos">
                            <div class="atual">
                                <canvas id="grafico-concluidos"></canvas>
                                <div class="center-info">
                                    <span class="material-icons">bolt</span>
                                    <h2>89%</h2>
                                    <p>Concluídos</p>
                                </div>
                            </div>
                            <div class="anterior">
                                <canvas id="mini-concluido"></canvas>
                            </div>
                        </div>
                        <div class="concluidos">
                            <div class="atual">
                                <canvas id="grafico-prazo"></canvas>
                            </div>
                            <div class="anterior">
                                <canvas id="mini-prazo"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="top3">
                    
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
